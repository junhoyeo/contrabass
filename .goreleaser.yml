version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/contrabass
    binary: contrabass
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: ['tar.gz']
    files:
      - README.md
      - LICENSE

brews:
  - repository:
      owner: junhoyeo
      name: homebrew-contrabass
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/junhoyeo/contrabass
    description: A project-level orchestrator for AI coding agents
    license: Apache-2.0
    install: |
      bin.install "contrabass"

changelog:
  disable: true
